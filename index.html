<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Rasti Runs"/>
<meta name="theme-color" content="#0a0a0c"/>
<link rel="manifest" href="/manifest.json"/>
<title>Rasti Runs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0c;
  --bg2: #111114;
  --bg3: #18181c;
  --bg4: #222228;
  --border: rgba(255,255,255,.06);
  --border2: rgba(255,255,255,.1);
  --text: #f4f4f5;
  --text2: #a1a1aa;
  --text3: #52525b;
  --accent: #f97316;
  --accent2: #fb923c;
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #a855f7;
  --teal: #14b8a6;
  --red: #ef4444;
  --phase-c2k: #3b82f6;
  --phase-base: #a855f7;
  --phase-build: #ec4899;
  --phase-taper: #14b8a6;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; background: var(--bg); }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: calc(72px + var(--safe-bottom));
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }
::-webkit-scrollbar { width: 0; }

/* ── NOISE TEXTURE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ── NAV ── */
.nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: calc(68px + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(10,10,12,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-around;
  padding-top: 10px;
  z-index: 100;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 4px 16px;
  border-radius: 12px;
  transition: all .15s;
  color: var(--text3);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .03em;
  text-transform: uppercase;
}
.nav-item.active { color: var(--accent); }
.nav-item svg { width: 22px; height: 22px; }

/* ── SCREENS ── */
.screen { display: none; padding: calc(var(--safe-top) + 1rem) 1rem 1rem; position: relative; z-index: 1; }
.screen.active { display: block; }

/* ── HOME SCREEN ── */
.home-hero {
  margin-bottom: 1.5rem;
  padding: 1.5rem;
  background: linear-gradient(135deg, #1a0a00 0%, #0a0a0c 60%);
  border-radius: 20px;
  border: 1px solid rgba(249,115,22,.15);
  position: relative;
  overflow: hidden;
}
.home-hero::after {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(249,115,22,.12) 0%, transparent 70%);
  pointer-events: none;
}
.home-greeting {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.8rem;
  letter-spacing: .04em;
  line-height: 1;
  margin-bottom: .4rem;
}
.home-greeting span { color: var(--accent); }
.home-meta { font-size: .8rem; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
.race-countdown {
  display: flex;
  gap: .75rem;
  margin-top: 1.25rem;
}
.countdown-unit {
  flex: 1;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: .65rem .5rem;
  text-align: center;
}
.countdown-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  color: var(--accent);
  line-height: 1;
}
.countdown-label { font-size: .6rem; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-top: 2px; }

/* ── TODAY CARD ── */
.today-card {
  margin-bottom: 1rem;
  padding: 1.25rem;
  background: var(--bg2);
  border-radius: 16px;
  border: 1px solid var(--border);
}
.today-label {
  font-size: .65rem;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text3);
  margin-bottom: .6rem;
}
.session-row {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .7rem 0;
  border-bottom: 1px solid var(--border);
}
.session-row:last-child { border-bottom: none; }
.session-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.session-dot.run { background: var(--accent); }
.session-dot.strength { background: var(--purple); }
.session-dot.recovery { background: var(--teal); }
.session-dot.rest { background: var(--bg4); }
.session-info { flex: 1; }
.session-name { font-size: .9rem; font-weight: 500; }
.session-meta { font-size: .75rem; color: var(--text2); margin-top: 1px; }
.session-chip {
  font-size: .65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  padding: .2rem .5rem;
  border-radius: 6px;
}
.chip-run { background: rgba(249,115,22,.12); color: var(--accent); }
.chip-strength { background: rgba(168,85,247,.12); color: var(--purple); }
.chip-mobility { background: rgba(20,184,166,.12); color: var(--teal); }
.chip-rest { background: var(--bg4); color: var(--text3); }

/* ── WEEK PROGRESS ── */
.week-progress {
  margin-bottom: 1rem;
  padding: 1.25rem;
  background: var(--bg2);
  border-radius: 16px;
  border: 1px solid var(--border);
}
.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: .75rem;
}
.progress-title { font-weight: 600; font-size: .95rem; }
.progress-pct { font-family: 'JetBrains Mono', monospace; font-size: .8rem; color: var(--accent); }
.progress-bar {
  height: 6px;
  background: var(--bg4);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: .75rem;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width .8s ease;
}
.stats-row { display: flex; gap: .75rem; }
.stat-box {
  flex: 1;
  background: var(--bg3);
  border-radius: 10px;
  padding: .65rem;
  text-align: center;
}
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--text); line-height: 1; }
.stat-lbl { font-size: .6rem; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

/* ── STRAVA CARD ── */
.strava-card {
  margin-bottom: 1rem;
  padding: 1.25rem;
  background: var(--bg2);
  border-radius: 16px;
  border: 1px solid var(--border);
}
.strava-header { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; }
.strava-logo {
  width: 32px; height: 32px;
  background: #fc4c02;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: .85rem;
  color: white;
  letter-spacing: .05em;
}
.strava-title { font-weight: 600; font-size: .95rem; }
.strava-sub { font-size: .75rem; color: var(--text2); }
.btn-strava {
  width: 100%;
  padding: .85rem;
  background: #fc4c02;
  color: white;
  border-radius: 12px;
  font-weight: 600;
  font-size: .9rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  transition: opacity .15s;
}
.btn-strava:hover { opacity: .9; }
.btn-strava.connected { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
.recent-run {
  padding: .75rem 0;
  border-bottom: 1px solid var(--border);
}
.recent-run:last-child { border-bottom: none; }
.run-name { font-size: .9rem; font-weight: 500; }
.run-stats { display: flex; gap: 1rem; margin-top: .3rem; }
.run-stat { font-size: .75rem; color: var(--text2); font-family: 'JetBrains Mono', monospace; }

/* ── PLAN SCREEN ── */
.phase-pills {
  display: flex;
  gap: .5rem;
  overflow-x: auto;
  padding-bottom: .5rem;
  margin-bottom: 1rem;
  scrollbar-width: none;
}
.phase-pill {
  flex-shrink: 0;
  padding: .4rem .85rem;
  border-radius: 20px;
  font-size: .75rem;
  font-weight: 600;
  border: 1px solid var(--border2);
  color: var(--text2);
  background: transparent;
  transition: all .15s;
}
.phase-pill.active { color: #fff; border-color: transparent; }
.phase-pill.c2k.active { background: var(--phase-c2k); }
.phase-pill.base.active { background: var(--phase-base); }
.phase-pill.build.active { background: var(--phase-build); }
.phase-pill.taper.active { background: var(--phase-taper); }
.phase-pill.all.active { background: var(--accent); }

.week-card {
  margin-bottom: .75rem;
  background: var(--bg2);
  border-radius: 14px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.week-card.current-week { border-color: rgba(249,115,22,.3); }
.week-header {
  display: flex;
  align-items: center;
  padding: .85rem 1rem;
  background: var(--bg3);
  gap: .75rem;
  cursor: pointer;
}
.week-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: .7rem;
  color: var(--text3);
  min-width: 28px;
}
.week-phase-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.week-title { flex: 1; font-size: .88rem; font-weight: 500; }
.week-dates { font-size: .7rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
.week-arrow { font-size: .7rem; color: var(--text3); transition: transform .2s; }
.week-arrow.open { transform: rotate(180deg); }
.week-body { display: none; padding: .5rem; }
.week-body.open { display: block; }

.day-row {
  display: flex;
  gap: .6rem;
  padding: .5rem .5rem;
  border-radius: 8px;
  margin-bottom: 2px;
}
.day-row:hover { background: var(--bg3); }
.day-name {
  font-size: .7rem;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .06em;
  min-width: 32px;
  padding-top: 2px;
}
.day-name.today { color: var(--accent); }
.day-sessions { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.session-tag {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  font-size: .82rem;
  color: var(--text);
}
.tag-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.session-detail { font-size: .7rem; color: var(--text3); margin-top: 1px; }
.done-check {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: .65rem;
  flex-shrink: 0;
  cursor: pointer;
  transition: all .15s;
  margin-top: 2px;
}
.done-check.done { background: var(--green); border-color: var(--green); color: #000; }

/* ── SESSION DETAIL MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  visibility: hidden;
  transition: all .25s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal-sheet {
  width: 100%;
  max-height: 80vh;
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  padding: 1.25rem;
  padding-bottom: calc(1.25rem + var(--safe-bottom));
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--bg4);
  border-radius: 2px;
  margin: 0 auto 1.25rem;
}
.modal-sport {
  font-size: .65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: .4rem;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  letter-spacing: .04em;
  line-height: 1.1;
  margin-bottom: .3rem;
}
.modal-date { font-size: .75rem; color: var(--text2); font-family: 'JetBrains Mono', monospace; margin-bottom: 1rem; }
.modal-chips { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
.modal-chip {
  padding: .3rem .75rem;
  border-radius: 20px;
  font-size: .75rem;
  font-weight: 600;
  background: var(--bg3);
  border: 1px solid var(--border2);
}
.modal-desc {
  font-size: .88rem;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 1rem;
  padding: .9rem;
  background: var(--bg3);
  border-radius: 10px;
}
.btn-done {
  width: 100%;
  padding: .9rem;
  background: var(--accent);
  color: #000;
  border-radius: 12px;
  font-weight: 700;
  font-size: .95rem;
  margin-top: .5rem;
  transition: opacity .15s;
}
.btn-done:hover { opacity: .9; }
.btn-done.marked { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); }

/* ── STATS SCREEN ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 1rem; }
.big-stat {
  background: var(--bg2);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 1.1rem;
}
.big-stat-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  line-height: 1;
  color: var(--text);
}
.big-stat-unit { font-size: .7rem; color: var(--text3); margin-left: 2px; }
.big-stat-lbl { font-size: .7rem; color: var(--text2); margin-top: .3rem; }
.big-stat.accent .big-stat-val { color: var(--accent); }

.checkin-card {
  padding: 1.25rem;
  background: var(--bg2);
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-bottom: 1rem;
}
.checkin-title { font-weight: 600; font-size: 1rem; margin-bottom: 1rem; }
.checkin-field { margin-bottom: .85rem; }
.field-label { font-size: .75rem; color: var(--text2); margin-bottom: .4rem; text-transform: uppercase; letter-spacing: .06em; }
.field-input {
  width: 100%;
  padding: .75rem;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem;
  outline: none;
  transition: border-color .15s;
}
.field-input:focus { border-color: var(--accent); }
.rpe-row { display: flex; gap: .4rem; }
.rpe-btn {
  flex: 1;
  padding: .55rem 0;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text2);
  font-size: .8rem;
  font-weight: 600;
  transition: all .15s;
}
.rpe-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }
.btn-submit {
  width: 100%;
  padding: .9rem;
  background: var(--accent);
  color: #000;
  border-radius: 12px;
  font-weight: 700;
  font-size: .95rem;
  transition: opacity .15s;
}
.btn-submit:hover { opacity: .9; }
.knee-alert {
  display: flex; gap: .6rem; align-items: flex-start;
  padding: .9rem 1rem;
  background: rgba(239,68,68,.08);
  border: 1px solid rgba(239,68,68,.2);
  border-radius: 12px;
  margin-bottom: 1rem;
  font-size: .82rem;
  color: #fca5a5;
  line-height: 1.5;
}

/* ── SCREEN TITLE ── */
.screen-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  letter-spacing: .06em;
  margin-bottom: 1rem;
  padding-top: calc(var(--safe-top) + .5rem);
}

/* ── CHECKIN HISTORY ── */
.checkin-item {
  padding: .85rem 1rem;
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-bottom: .5rem;
}
.checkin-date { font-size: .7rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-bottom: .3rem; }
.checkin-summary { font-size: .85rem; color: var(--text2); }

/* ── LOADING ── */
.loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh;
  gap: 1rem;
}
.loading-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  color: var(--accent);
  letter-spacing: .1em;
}
.loading-bar {
  width: 120px; height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.loading-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  animation: loadAnim 1.2s ease forwards;
}
@keyframes loadAnim { from { width: 0 } to { width: 100% } }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp .35s ease forwards; }
.fade-up-2 { animation: fadeUp .35s .08s ease both; }
.fade-up-3 { animation: fadeUp .35s .16s ease both; }
.fade-up-4 { animation: fadeUp .35s .24s ease both; }

/* ── SESSION STATUS BADGES ── */
.status-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: .6rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; padding: .15rem .45rem; border-radius: 5px;
}
.status-done     { background: rgba(34,197,94,.12);  color: var(--green); }
.status-skipped  { background: rgba(239,68,68,.1);   color: var(--red); }
.status-moved-to { background: rgba(59,130,246,.1);  color: var(--blue); }
.status-moved-fr { background: rgba(168,85,247,.1);  color: var(--purple); }

/* ── SKIP REASON CHIPS ── */
.reason-row { display: flex; gap: .4rem; flex-wrap: wrap; margin: .75rem 0; }
.reason-btn {
  padding: .4rem .8rem; border-radius: 20px; font-size: .78rem; font-weight: 500;
  border: 1px solid var(--border2); background: var(--bg3); color: var(--text2);
  transition: all .15s; cursor: pointer;
}
.reason-btn:hover { background: var(--bg4); color: var(--text); }
.reason-btn.selected { border-color: var(--red); background: rgba(239,68,68,.1); color: var(--red); }

/* ── DATE PICKER MODAL ── */
.date-picker { margin: .75rem 0; }
.date-picker input[type=date] {
  width: 100%; padding: .75rem; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 10px;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: .9rem; outline: none;
}
.date-picker input[type=date]:focus { border-color: var(--blue); }

/* ── ACTION BUTTONS ROW ── */
.modal-actions { display: flex; flex-direction: column; gap: .6rem; margin-top: .75rem; }
.btn-action {
  width: 100%; padding: .8rem; border-radius: 12px;
  font-weight: 600; font-size: .9rem; transition: all .15s; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: .5rem;
}
.btn-complete-action { background: var(--green); color: #000; border: none; }
.btn-complete-action.marked { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
.btn-skip-action { background: rgba(239,68,68,.08); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
.btn-skip-action.active { background: rgba(239,68,68,.2); }
.btn-move-action { background: rgba(59,130,246,.08); color: var(--blue); border: 1px solid rgba(59,130,246,.2); }
.btn-move-action.active { background: rgba(59,130,246,.2); }
.btn-confirm { background: var(--accent); color: #000; border: none; }
.btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }

/* ── WEEK HEALTH INDICATOR ── */
.week-health { display: flex; gap: 3px; align-items: center; }
.health-dot { width: 6px; height: 6px; border-radius: 50%; }
.health-dot.done     { background: var(--green); }
.health-dot.skipped  { background: var(--red); }
.health-dot.moved    { background: var(--blue); }
.health-dot.pending  { background: var(--bg4); }

/* ── HOLIDAY BLOCK ── */
.holiday-block {
  padding: .75rem 1rem; border-radius: 10px; margin-bottom: .5rem;
  display: flex; align-items: center; justify-content: space-between;
  font-size: .85rem;
}
.holiday-block.holiday { background: rgba(251,191,36,.08); border: 1px solid rgba(251,191,36,.2); color: #fbbf24; }
.holiday-block.sick    { background: rgba(239,68,68,.08);  border: 1px solid rgba(239,68,68,.2);  color: var(--red); }
.add-block-btn {
  width: 100%; padding: .75rem; border-radius: 10px; font-size: .85rem;
  font-weight: 500; background: var(--bg3); border: 1px dashed var(--border2);
  color: var(--text2); transition: all .15s; cursor: pointer; margin-bottom: 1rem;
}
.add-block-btn:hover { background: var(--bg4); color: var(--text); }

/* ── WEEKLY OVERVIEW ── */
.week-overview-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: .5rem; margin-bottom: 1.5rem;
}
.week-overview-card {
  background: var(--bg2); border-radius: 10px; border: 1px solid var(--border);
  padding: .65rem .75rem; cursor: pointer; transition: all .15s;
}
.week-overview-card:hover { border-color: var(--border2); }
.week-overview-card.has-issues { border-color: rgba(239,68,68,.3); }
.week-overview-card.current { border-color: rgba(249,115,22,.4); }
.wow-label { font-size: .65rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
.wow-title { font-size: .78rem; font-weight: 500; margin: .2rem 0; }
.wow-dots { display: flex; gap: 2px; flex-wrap: wrap; }

</style>

const RACE_DATE = new Date('2027-05-23');
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const TODAY_STR = TODAY.toISOString().split('T')[0];
const STORAGE = 'rasti-runs-v1';

// ── STATE ──────────────────────────────────────────────────────────────────
let state = {
  completed: {},
  skipped: {},      // {woId: {reason, date}}
  moved: {},        // {woId: {fromDate, toDate, swappedWith}}
  blocks: [],       // [{type:'holiday'|'sick', start, end, label}]
  checkins: [],

};

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE);
    if (s) state = { ...state, ...JSON.parse(s) };
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE, JSON.stringify(state)); } catch(e) {}
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function daysToRace() {
  return Math.max(0, Math.ceil((RACE_DATE - TODAY) / 86400000));
}
function currentWeek() {
  return PLAN.find(w => w.start <= TODAY_STR && w.end >= TODAY_STR) || PLAN[1];
}
function todaySessions() {
  const w = currentWeek();
  if (!w) return [];
  const day = w.days.find(d => d.date === TODAY_STR);
  return day ? day.sessions : [];
}
function totalWorkouts() {
  return PLAN.reduce((s,w) => s + w.days.reduce((ss,d) => ss + d.sessions.length, 0), 0);
}
function completedCount() { return Object.values(state.completed).filter(Boolean).length; }
function overallPct() { return Math.round(completedCount() / Math.max(totalWorkouts(),1) * 100); }
function weekKm() {
  const w = currentWeek();
  if (!w) return 0;
  return w.days.reduce((s,d) => s + d.sessions.reduce((ss,wo) => ss + (wo.dist||0), 0), 0);
}
function phaseClass(phase) {
  if (phase.includes('10K')) return 'c2k';
  if (phase.includes('Base')) return 'base';
  if (phase.includes('Half')) return 'build';
  return 'taper';
}
function sportColor(sport, type) {
  if (sport === 'run') return 'var(--accent)';
  if (type === 'recovery') return 'var(--teal)';
  return 'var(--purple)';
}
function chipClass(sport, type) {
  if (sport === 'run') return 'chip-run';
  if (type === 'recovery') return 'chip-mobility';
  return 'chip-strength';
}
function chipLabel(sport, type) {
  if (sport === 'run') return 'RUN';
  if (type === 'recovery') return 'MOBILITY';
  if (type === 'activation') return 'ACTIVATION';
  return 'STRENGTH';
}
function fmtDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}

// ── SCREEN ROUTING ────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'plan') renderPlan();
  if (name === 'stats') renderStats();
}

// ── PLAN SCREEN ───────────────────────────────────────────────────────────
function renderPlan() {
  const phases = ['all','Couch to 10K','Base Building','Half Marathon Build','Taper'];
  const phaseLabels = {'all':'All','Couch to 10K':'C→10K','Base Building':'Base','Half Marathon Build':'HM Build','Taper':'Taper'};

  const pillsHTML = phases.map(ph => {
    const cls = ph === 'all' ? 'all' : phaseClass(ph);
    const active = state.activePhaseFilter === ph ? 'active' : '';
    return `<button class="phase-pill ${cls} ${active}" onclick="filterPhase('${ph}')">${phaseLabels[ph]}</button>`;
  }).join('');

  const filteredWeeks = PLAN.filter(w =>
    state.activePhaseFilter === 'all' || w.phase === state.activePhaseFilter
  );

  const weeksHTML = filteredWeeks.map(w => {
    const isCurrent = w.start <= TODAY_STR && w.end >= TODAY_STR;
    const cls = phaseClass(w.phase);
    const wLabel = w.wn === 0 ? 'W0' : 'W'+w.wn;
    const doneCount = w.days.reduce((s,d) => s + d.sessions.filter(wo => state.completed[wo.id]).length, 0);
    const totalCount = w.days.reduce((s,d) => s + d.sessions.length, 0);

    const daysHTML = w.days.map(d => {
      const isToday = d.date === TODAY_STR;
      if (d.sessions.length === 0) return `
        <div class="day-row">
          <div class="day-name ${isToday?'today':''}">${d.dow.slice(0,3).toUpperCase()}</div>
          <div class="day-sessions"><div class="session-tag" style="color:var(--text3)"><div class="tag-dot" style="background:var(--bg4)"></div>Rest</div></div>
        </div>`;
      return d.sessions.map(wo => `
        <div class="day-row" onclick="openModal(${JSON.stringify(wo).replace(/"/g,'&quot;')}, '${d.date}')">
          <div class="day-name ${isToday?'today':''}">${d.dow.slice(0,3).toUpperCase()}</div>
          <div class="day-sessions">
            <div class="session-tag">
              <div class="tag-dot" style="background:${sportColor(wo.sport,wo.type)}"></div>
              ${wo.name}
            </div>
            <div class="session-detail">${wo.dist?wo.dist+'km':''}${wo.dur?' '+wo.dur+'min':''}${wo.hr?' · HR '+wo.hr:''}</div>
          </div>
          <div class="done-check ${state.completed[wo.id]?'done':state.skipped[wo.id]?'skipped':state.moved[wo.id]?'moved':''}" 
               style="${state.skipped[wo.id]?'border-color:var(--red);color:var(--red);':state.moved[wo.id]?'border-color:var(--blue);color:var(--blue);':''}"
               onclick="event.stopPropagation();openModal(${JSON.stringify(wo).replace(/"/g,'&quot;')}, '${d.date}')">
            ${state.completed[wo.id]?'✓':state.skipped[wo.id]?'⏭':state.moved[wo.id]?'↗':''}
          </div>
        </div>`).join('');
    }).join('');

    return `
      <div class="week-card ${isCurrent?'current-week':''}" id="week-${w.wn}">
        <div class="week-header" onclick="toggleWeek(${w.wn})">
          <div class="week-num">${wLabel}</div>
          <div class="week-phase-dot" style="background:var(--phase-${cls})"></div>
          <div class="week-title">${w.focus}${w.recovery?' 🔄':''}</div>
          <div class="week-dates">${w.start?.slice(5)} → ${w.end?.slice(5)}</div>
          <div class="week-arrow" id="arrow-${w.wn}">▾</div>
        </div>
        <div class="week-body ${isCurrent?'open':''}" id="body-${w.wn}">
          ${daysHTML}
        </div>
      </div>`;
  }).join('');

  document.getElementById('screen-plan').innerHTML = `
    <div class="screen-title">Training Plan</div>
    <div class="phase-pills">${pillsHTML}</div>
    <div id="weeks-container">${weeksHTML}</div>`;

  // Scroll to current week
  setTimeout(() => {
    const cw = currentWeek();
    if (cw) {
      const el = document.getElementById('week-'+cw.wn);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 100);
}

function toggleWeek(wn) {
  const body = document.getElementById('body-'+wn);
  const arrow = document.getElementById('arrow-'+wn);
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function filterPhase(phase) {
  state.activePhaseFilter = phase;
  renderPlan();
}

      <div class="checkin-field">
        <div class="field-label">Run distance (km)</div>
        <input class="field-input" id="ci-dist" type="number" step="0.1" placeholder="e.g. 5.2"/>
      </div>
      <div class="checkin-field">
        <div class="field-label">Time (mm:ss)</div>
        <input class="field-input" id="ci-time" type="text" placeholder="e.g. 28:30"/>
      </div>
      <div class="checkin-field">
        <div class="field-label">Average HR (bpm)</div>
        <input class="field-input" id="ci-hr" type="number" placeholder="e.g. 145"/>
      </div>
      <div class="checkin-field">
        <div class="field-label">RPE (1=easy, 10=max)</div>
        <div class="rpe-row">${rpeButtons}</div>
      </div>
      <div class="checkin-field">
        <div class="field-label">Knee feedback</div>
        <input class="field-input" id="ci-knee" type="text" placeholder="e.g. All good / slight ache"/>
      </div>
      <div class="checkin-field">
        <div class="field-label">Notes</div>
        <input class="field-input" id="ci-notes" type="text" placeholder="How did it feel?"/>
      </div>
      <button class="btn-submit" onclick="submitCheckin()">Save Check-in</button>
    </div>

    <div style="font-size:.85rem;font-weight:600;margin-bottom:.5rem;color:var(--text2)">Recent Check-ins</div>
    ${checkinsHTML}`;
}

function selectRpe(n) {
  state.selectedRpe = n;
  renderStats();
}

function submitCheckin() {
  const dist = document.getElementById('ci-dist').value;
  const time = document.getElementById('ci-time').value;
  const hr = document.getElementById('ci-hr').value;
  const knee = document.getElementById('ci-knee').value;
  const notes = document.getElementById('ci-notes').value;
  if (!dist || !time) { alert('Please enter at least distance and time'); return; }
  // Auto-include skipped sessions since last checkin
  const lastCheckin = state.checkins[state.checkins.length-1];
  const lastDate = lastCheckin ? lastCheckin.rawDate : null;
  const skippedThisWeek = Object.entries(state.skipped)
    .filter(([id, info]) => !lastDate || info.date > lastDate)
    .map(([id, info]) => info.reason)
    .filter(Boolean);
  const movedThisWeek = Object.keys(state.moved).length / 2 | 0;

  state.checkins.push({
    date: new Date().toLocaleDateString('en-GB'),
    rawDate: new Date().toISOString().split('T')[0],
    dist, time, hr,
    rpe: state.selectedRpe || '—',
    knee, notes,
    skipped: skippedThisWeek.length > 0 ? skippedThisWeek.join(', ') : null,
    moved: movedThisWeek > 0 ? movedThisWeek : null,
  });
  state.selectedRpe = null;
  saveState();
  renderStats();
}

// ── MODAL ─────────────────────────────────────────────────────────────────
// ── MODAL STATE ───────────────────────────────────────────────────────────
let modalWo = null, modalDate = null, modalMode = null, modalSkipReason = null;

function openModal(wo, dateStr) {
  if (typeof wo === 'string') wo = JSON.parse(wo.replace(/&quot;/g,'"'));
  modalWo = wo; modalDate = dateStr; modalMode = null; modalSkipReason = null;
  renderModalContent();
  document.getElementById('modal').classList.add('open');
}

function renderModalContent() {
  const wo = modalWo, dateStr = modalDate;
  if (!wo) return;
  const sportLabel = wo.sport === 'run' ? 'RUN' : wo.type === 'recovery' ? 'MOBILITY' : 'STRENGTH';
  const color = sportColor(wo.sport, wo.type);
  const isDone    = !!state.completed[wo.id];
  const isSkipped = !!state.skipped[wo.id];
  const isMoved   = !!state.moved[wo.id];
  const skipInfo  = state.skipped[wo.id];
  const moveInfo  = state.moved[wo.id];

  let statusHTML = '';
  if (isDone)    statusHTML = '<span class="status-badge status-done">✓ Done</span>';
  if (isSkipped) statusHTML = `<span class="status-badge status-skipped">⏭ Skipped${skipInfo?.reason?' · '+skipInfo.reason:''}</span>`;
  if (isMoved)   statusHTML = `<span class="status-badge status-moved-to">📅 Moved to ${moveInfo?.toDate||''}</span>`;

  let extraHTML = '';

  if (modalMode === 'skip') {
    const reasons = SKIP_REASONS.map(r =>
      `<button class="reason-btn ${modalSkipReason===r?'selected':''}" onclick="selectSkipReason('${r}')">${r}</button>`
    ).join('');
    extraHTML = `
      <div style="font-size:.82rem;color:var(--text2);margin:.75rem 0 .4rem">Why are you skipping?</div>
      <div class="reason-row">${reasons}</div>
      <div class="modal-actions">
        <button class="btn-action btn-confirm" onclick="confirmSkip()">⏭ Confirm Skip</button>
        <button class="btn-action btn-secondary" onclick="cancelModalMode()">Cancel</button>
      </div>`;
  } else if (modalMode === 'move') {
    extraHTML = `
      <div style="font-size:.82rem;color:var(--text2);margin:.75rem 0 .4rem">Move to which day?</div>
      <div class="date-picker"><input type="date" id="moveDate" value="${dateStr}" min="${dateStr}"/></div>
      <div style="font-size:.75rem;color:var(--text3);margin-bottom:.75rem">If that day already has a session it will swap with this one.</div>
      <div class="modal-actions">
        <button class="btn-action btn-confirm" onclick="confirmMove()">📅 Confirm Move</button>
        <button class="btn-action btn-secondary" onclick="cancelModalMode()">Cancel</button>
      </div>`;
  } else if (modalMode === 'unskip') {
    extraHTML = `
      <div class="modal-actions">
        <button class="btn-action btn-confirm" onclick="confirmUnskip()">↩ Restore Session</button>
        <button class="btn-action btn-secondary" onclick="cancelModalMode()">Cancel</button>
      </div>`;
  } else {
    // Normal mode — show all action buttons
    extraHTML = `<div class="modal-actions">
      <button class="btn-action btn-complete-action ${isDone?'marked':''}" onclick="toggleDone('${wo.id}');renderModalContent();refreshCurrentScreen()">
        ${isDone ? '✓ Marked Complete — tap to undo' : '✓ Mark as Complete'}
      </button>
      ${isSkipped
        ? `<button class="btn-action btn-skip-action" onclick="modalMode='unskip';renderModalContent()">↩ Restore this session</button>`
        : `<button class="btn-action btn-skip-action" onclick="modalMode='skip';renderModalContent()">⏭ Skip this session</button>`
      }
      ${isMoved
        ? `<button class="btn-action btn-move-action">📅 Moved to ${moveInfo?.toDate}</button>`
        : `<button class="btn-action btn-move-action" onclick="modalMode='move';renderModalContent()">📅 Move to another day</button>`
      }
    </div>`;
  }

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-sport" style="color:${color}">${sportLabel}</div>
    <div class="modal-title">${wo.name}</div>
    <div class="modal-date" style="display:flex;align-items:center;gap:.5rem">${fmtDate(dateStr)} ${statusHTML}</div>
    <div class="modal-chips" style="margin:.75rem 0">
      ${wo.dist ? '<span class="modal-chip">📍 '+wo.dist+'km</span>' : ''}
      ${wo.dur ? '<span class="modal-chip">⏱ '+wo.dur+' min</span>' : ''}
      ${wo.hr ? '<span class="modal-chip">❤️ '+wo.hr+'</span>' : ''}
      ${wo.pace ? '<span class="modal-chip">🏃 '+wo.pace+'</span>' : ''}
      ${wo.zone ? '<span class="modal-chip">📊 '+wo.zone+'</span>' : ''}
    </div>
    ${wo.desc ? '<div class="modal-desc">'+wo.desc+'</div>' : ''}
    ${extraHTML}`;
}

function selectSkipReason(r) { modalSkipReason = r; renderModalContent(); }
function cancelModalMode() { modalMode = null; modalSkipReason = null; renderModalContent(); }

function confirmSkip() {
  if (!modalWo) return;
  state.skipped[modalWo.id] = { reason: modalSkipReason || 'Other', date: modalDate };
  delete state.completed[modalWo.id];
  saveState(); modalMode = null;
  renderModalContent(); refreshCurrentScreen();
}

function confirmUnskip() {
  if (!modalWo) return;
  delete state.skipped[modalWo.id];
  saveState(); modalMode = null;
  renderModalContent(); refreshCurrentScreen();
}

function confirmMove() {
  const toDate = document.getElementById('moveDate')?.value;
  if (!toDate || !modalWo) return;
  const fromDate = modalDate;
  if (toDate === fromDate) { cancelModalMode(); return; }

  // Find session already on toDate (for swap)
  let swapWoId = null;
  for (const w of PLAN) {
    const day = w.days.find(d => d.date === toDate);
    if (day) {
      const s = day.sessions[0];
      if (s) swapWoId = s.id;
    }
  }

  // Record move
  state.moved[modalWo.id] = { fromDate, toDate, swappedWith: swapWoId };

  // If swapping, record the swap partner's move back
  if (swapWoId) {
    state.moved[swapWoId] = { fromDate: toDate, toDate: fromDate, swappedWith: modalWo.id };
  }

  saveState(); modalMode = null;
  renderModalContent(); refreshCurrentScreen();
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
    modalWo = null; modalDate = null; modalMode = null;
  }
}

function toggleDone(id) {
  state.completed[id] = !state.completed[id];
  if (!state.completed[id]) delete state.completed[id];
  // Clear skip if marking done
  if (state.completed[id]) delete state.skipped[id];
  saveState();
}

function refreshCurrentScreen() {
  const active = document.querySelector('.screen.active')?.id;
  if (active === 'screen-home') renderHome();
  if (active === 'screen-plan') renderPlan();
  if (active === 'screen-stats') renderStats();
}

// ── STRAVA ────────────────────────────────────────────────────────────────
// ── STRAVA OAUTH ─────────────────────────────────────────────────────────
async function connectStrava() {
  const redirectUri = window.location.origin + window.location.pathname;
  const scope = 'read,activity:read_all';
  window.location.href = `https://www.strava.com/oauth/authorize?client_id=${STRAVA_CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=code&scope=${scope}&approval_prompt=auto`;
}

async function handleStravaCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    alert('Strava connection cancelled.');
    window.history.replaceState({}, '', window.location.pathname);
    return;
  }

  if (!code) return;

  // Exchange code for token via Netlify function
  try {
    const resp = await fetch('/.netlify/functions/strava-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, grant_type: 'authorization_code' }),
    });
    const data = await resp.json();

    if (data.access_token) {
      state.stravaConnected = true;
      state.stravaToken = data.access_token;
      state.stravaRefreshToken = data.refresh_token;
      state.stravaExpiresAt = data.expires_at;
      if (data.athlete) {
        state.stravaAthlete = data.athlete;
      }
      saveState();
      await fetchStravaActivities();
      window.history.replaceState({}, '', window.location.pathname);
      renderHome();
    } else {
      console.error('Strava auth failed:', data);
    }
  } catch (err) {
    console.error('Strava auth error:', err);
  }
}

async function refreshStravaToken() {
  if (!state.stravaRefreshToken) return false;
  if (state.stravaExpiresAt && Date.now() / 1000 < state.stravaExpiresAt - 300) return true;

  try {
    const resp = await fetch('/.netlify/functions/strava-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: state.stravaRefreshToken, grant_type: 'refresh_token' }),
    });
    const data = await resp.json();
    if (data.access_token) {
      state.stravaToken = data.access_token;
      state.stravaExpiresAt = data.expires_at;
      saveState();
      return true;
    }
  } catch (err) {}
  return false;
}

async function fetchStravaActivities() {
  const valid = await refreshStravaToken();
  if (!valid || !state.stravaToken) return;

  try {
    const resp = await fetch(`/.netlify/functions/strava-activities?token=${state.stravaToken}`);
    const acts = await resp.json();
    if (Array.isArray(acts)) {
      state.stravaRuns = acts.filter(a => a.type === 'Run' || a.sport_type === 'Run');
      saveState();
    }
  } catch (err) {}
}

// ── INIT ──────────────────────────────────────────────────────────────────

function showAddBlock() {
  const type = prompt('Type: holiday or sick');
  if (!type || !['holiday','sick'].includes(type.toLowerCase())) return;
  const start = prompt('Start date (YYYY-MM-DD):');
  if (!start) return;
  const end = prompt('End date (YYYY-MM-DD):');
  if (!end) return;
  const label = prompt('Label (optional, e.g. "Summer holiday"):', type);
  state.blocks.push({ type: type.toLowerCase(), start, end, label: label || type });
  // Auto-skip sessions in range
  for (const w of PLAN) {
    for (const d of w.days) {
      if (d.date >= start && d.date <= end) {
        for (const s of d.sessions) {
          if (!state.completed[s.id]) {
            state.skipped[s.id] = { reason: type==='sick'?'Sick':'Holiday', date: d.date };
          }
        }
      }
    }
  }
  saveState(); renderStats();
}

function removeBlock(idx) {
  const b = state.blocks[idx];
  // Remove auto-skips for that range
  for (const w of PLAN) {
    for (const d of w.days) {
      if (d.date >= b.start && d.date <= b.end) {
        for (const s of d.sessions) {
          const sk = state.skipped[s.id];
          if (sk && (sk.reason === 'Holiday' || sk.reason === 'Sick')) {
            delete state.skipped[s.id];
          }
        }
      }
    }
  }
  state.blocks.splice(idx, 1);
  saveState(); renderStats();
}

loadState();

// Handle Strava OAuth callback on page load
if (window.location.search.includes('code=')) {
  handleStravaCallback();
}

// Refresh Strava data if connected
if (state.stravaConnected && state.stravaToken) {
  fetchStravaActivities().then(() => renderHome());
}

setTimeout(() => {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderHome();
}, 1300);

// Service worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
